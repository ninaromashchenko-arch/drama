<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drama Pics — Image Variations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%}
  body{
    background:#08090c;color:#e8eaf0;
    font-family:var(--ui-font,'Inter'),system-ui,sans-serif;
    font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden;
  }
  :root{
    --ui-font:'Inter';--display-font:'Inter';--mono-font:'JetBrains Mono';
    --display-weight:600;--display-tracking:-0.02em;
    --bg-0:#08090c;--bg-1:#0f1116;--bg-2:#15181f;--bg-3:#1c2029;--bg-4:#252a35;
    --line-1:#ffffff0d;--line-2:#ffffff14;--line-3:#ffffff22;
    --text-1:#eef0f5;--text-2:#a4abbc;--text-3:#6c7488;--text-4:#454c5c;
    --accent:#7aa2ff;--accent-soft:#7aa2ff20;--accent-line:#7aa2ff55;
    --success:#4ade80;--warn:#fbbf24;--danger:#f87171;
  }
  ::selection{background:var(--accent-soft);color:#fff}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
  input,textarea,select{font-family:inherit;color:inherit}
  .display{font-family:var(--display-font),serif;font-weight:var(--display-weight);letter-spacing:var(--display-tracking)}
  .mono{font-family:var(--mono-font),ui-monospace,monospace}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#ffffff14;border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:#ffffff22;background-clip:padding-box;border:2px solid transparent}
  textarea::placeholder,input::placeholder{color:var(--text-4);opacity:1}
</style>
</head>
<body>
<div id="root"></div>
<script>window.TWEAK_DEFAULTS={"fontPair":"inter-jetbrains"};</script>

<!-- ═══════════ TWEAKS PANEL ═══════════ -->
<script type="text/babel">
const __TWEAKS_STYLE=`
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.78);color:#29261b;-webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  select.twk-field{padding-right:22px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
`;
function useTweaks(defaults){
  const[values,setValues]=React.useState(defaults);
  const setTweak=React.useCallback((k,v)=>{
    const edits=typeof k==='object'&&k!==null?k:{[k]:v};
    setValues(p=>({...p,...edits}));
    window.parent.postMessage({type:'__edit_mode_set_keys',edits},'*');
  },[]);
  return[values,setTweak];
}
function TweaksPanel({title='Tweaks',children}){
  const[open,setOpen]=React.useState(false);
  const dragRef=React.useRef(null);
  const offRef=React.useRef({x:16,y:16});
  const clamp=React.useCallback(()=>{
    const p=dragRef.current;if(!p)return;
    const w=p.offsetWidth,h=p.offsetHeight,PAD=16;
    offRef.current={x:Math.min(Math.max(PAD,offRef.current.x),Math.max(PAD,window.innerWidth-w-PAD)),y:Math.min(Math.max(PAD,offRef.current.y),Math.max(PAD,window.innerHeight-h-PAD))};
    p.style.right=offRef.current.x+'px';p.style.bottom=offRef.current.y+'px';
  },[]);
  React.useEffect(()=>{if(!open)return;clamp();const ro=typeof ResizeObserver!=='undefined'?new ResizeObserver(clamp):null;if(ro){ro.observe(document.documentElement);return()=>ro.disconnect();}window.addEventListener('resize',clamp);return()=>window.removeEventListener('resize',clamp);},[open,clamp]);
  React.useEffect(()=>{const h=e=>{const t=e?.data?.type;if(t==='__activate_edit_mode')setOpen(true);else if(t==='__deactivate_edit_mode')setOpen(false);};window.addEventListener('message',h);window.parent.postMessage({type:'__edit_mode_available'},'*');return()=>window.removeEventListener('message',h);},[]);
  const dismiss=()=>{setOpen(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');};
  const onDrag=e=>{const p=dragRef.current;if(!p)return;const r=p.getBoundingClientRect(),sx=e.clientX,sy=e.clientY,sr=window.innerWidth-r.right,sb=window.innerHeight-r.bottom;const mv=ev=>{offRef.current={x:sr-(ev.clientX-sx),y:sb-(ev.clientY-sy)};clamp();};const up=()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);};
  if(!open)return null;
  return(<><style>{__TWEAKS_STYLE}</style><div ref={dragRef} className="twk-panel" style={{right:offRef.current.x,bottom:offRef.current.y}}><div className="twk-hd" onMouseDown={onDrag}><b>{title}</b><button className="twk-x" onMouseDown={e=>e.stopPropagation()} onClick={dismiss}>✕</button></div><div className="twk-body">{children}</div></div></>);
}
function TweakSection({label,children}){return<><div className="twk-sect">{label}</div>{children}</>;}
function TweakRow({label,value,children}){return<div className="twk-row"><div className="twk-lbl"><span>{label}</span>{value!=null&&<span style={{color:'rgba(41,38,27,.5)'}}>{value}</span>}</div>{children}</div>;}
function TweakSelect({label,value,options,onChange}){return<TweakRow label={label}><select className="twk-field" value={value} onChange={e=>onChange(e.target.value)}>{options.map(o=>{const v=typeof o==='object'?o.value:o,l=typeof o==='object'?o.label:o;return<option key={v} value={v}>{l}</option>;})}</select></TweakRow>;}
Object.assign(window,{useTweaks,TweaksPanel,TweakSection,TweakRow,TweakSelect});
</script>

<!-- ═══════════ ICONS ═══════════ -->
<script type="text/babel">
const Ic=({d,size=14,sw=1.5,fill='none',style})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>{typeof d==='string'?<path d={d}/>:d}</svg>);
const Icon={
  Sparkle:p=><Ic {...p} d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M5.6 18.4l2.8-2.8M15.6 8.4l2.8-2.8"/>,
  Plus:   p=><Ic {...p} d="M12 5v14M5 12h14"/>,
  Minus:  p=><Ic {...p} d="M5 12h14"/>,
  Image:  p=><Ic {...p} d={<><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></>}/>,
  Upload: p=><Ic {...p} d="M12 16V4m0 0-5 5m5-5 5 5M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>,
  Refresh:p=><Ic {...p} d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/>,
  Download:p=><Ic {...p} d="M12 3v12m0 0-4-4m4 4 4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>,
  Trash:  p=><Ic {...p} d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m5 5v6m4-6v6"/>,
  Check:  p=><Ic {...p} d="M5 12l5 5L20 7" sw={2}/>,
  Star:   p=><Ic {...p} d="M12 3l2.7 5.5 6 .9-4.4 4.2 1 6L12 16.8 6.7 19.6l1-6L3.3 9.4l6-.9L12 3z"/>,
  Globe:  p=><Ic {...p} d={<><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></>}/>,
  Chevron:p=><Ic {...p} d="m6 9 6 6 6-6"/>,
  Close:  p=><Ic {...p} d="M6 6l12 12M18 6 6 18"/>,
  Compare:p=><Ic {...p} d={<><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 3v18"/></>}/>,
  Branch: p=><Ic {...p} d={<><circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="8" r="2"/><path d="M6 8v8M6 14a4 4 0 0 0 4-4 4 4 0 0 1 4-4h2"/></>}/>,
  Eye:    p=><Ic {...p} d={<><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></>}/>,
  Layers: p=><Ic {...p} d="M12 2 2 8l10 6 10-6-10-6zM2 16l10 6 10-6M2 12l10 6 10-6"/>,
  AlertCircle:p=><Ic {...p} d={<><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></>}/>,
};
window.Icon=Icon;
</script>

<!-- ═══════════ SIDEBAR ═══════════ -->
<script type="text/babel">
const Section=({label,hint,children,right})=>(<div style={{marginBottom:18}}><div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:8}}><div style={{fontSize:10,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-3)'}}>{label}</div>{right}</div>{hint&&<div style={{fontSize:11,color:'var(--text-3)',marginBottom:8,lineHeight:1.5}}>{hint}</div>}{children}</div>);
const Pill=({active,onClick,children})=>(<button onClick={onClick} style={{fontSize:11.5,padding:'6px 11px',borderRadius:999,border:'1px solid',borderColor:active?'var(--accent-line)':'var(--line-1)',background:active?'var(--accent-soft)':'transparent',color:active?'var(--accent)':'var(--text-2)',transition:'all .15s'}}>{children}</button>);
const Card=({active,onClick,children,padding='10px 8px'})=>(<button onClick={onClick} style={{background:active?'var(--accent-soft)':'var(--bg-2)',border:'1px solid',borderColor:active?'var(--accent-line)':'var(--line-1)',borderRadius:8,padding,cursor:'pointer',textAlign:'center',transition:'all .15s',color:'var(--text-1)',display:'flex',flexDirection:'column',gap:2,alignItems:'center',justifyContent:'center'}}>{children}</button>);
const Field=({...p})=>(<textarea {...p} style={{width:'100%',background:'var(--bg-2)',border:'1px solid var(--line-1)',borderRadius:8,color:'var(--text-1)',fontSize:12.5,padding:'10px 12px',outline:'none',lineHeight:1.55,resize:'none',transition:'border .15s',caretColor:'var(--accent)',...p.style}} onFocus={e=>e.target.style.borderColor='var(--accent-line)'} onBlur={e=>e.target.style.borderColor='var(--line-1)'}/>);
const SInput=p=>(<input {...p} style={{width:'100%',background:'var(--bg-2)',border:'1px solid var(--line-1)',borderRadius:8,color:'var(--text-1)',fontSize:12.5,padding:'9px 12px',outline:'none',transition:'border .15s',caretColor:'var(--accent)',...p.style}} onFocus={e=>e.target.style.borderColor='var(--accent-line)'} onBlur={e=>e.target.style.borderColor='var(--line-1)'}/>);
const SSelect=({children,onChange,...p})=>(<div style={{position:'relative'}}><select {...p} onChange={onChange?e=>onChange(e.target.value):undefined} style={{width:'100%',appearance:'none',WebkitAppearance:'none',background:'var(--bg-2)',border:'1px solid var(--line-1)',borderRadius:8,color:'var(--text-1)',fontSize:12.5,padding:'9px 32px 9px 12px',outline:'none',cursor:'pointer',...p.style}}>{children}</select><div style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',color:'var(--text-3)',pointerEvents:'none'}}><Icon.Chevron size={12}/></div></div>);
const Toggle=({value,onChange,options})=>(<div style={{display:'flex',background:'var(--bg-1)',border:'1px solid var(--line-1)',borderRadius:7,padding:2,gap:2}}>{options.map(o=>(<button key={String(o.value)} onClick={()=>onChange(o.value)} style={{padding:'4px 12px',borderRadius:5,fontSize:11.5,fontWeight:500,background:value===o.value?'var(--bg-3)':'transparent',color:value===o.value?'var(--text-1)':'var(--text-3)',transition:'all .15s'}}>{o.label}</button>))}</div>);
const Slider=({value,onChange,min=0,max=100,step=1,leftLabel,rightLabel})=>(<div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:10.5,color:'var(--text-3)',minWidth:36}}>{leftLabel}</span><input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(parseInt(e.target.value))} style={{flex:1,accentColor:'var(--accent)',height:3}}/><span style={{fontSize:10.5,color:'var(--text-3)',minWidth:28,textAlign:'right'}}>{rightLabel}</span><span className="mono" style={{fontSize:11,color:'var(--accent)',minWidth:36,textAlign:'right'}}>{value}{max===100?'%':''}</span></div>);

const ModelGrid=({value,onChange})=>{
  const models=[
    {id:'fast',name:'Fast',desc:'Nano Banana 2',glyph:'⚡',tint:'#7aa2ff'},
    {id:'pro', name:'Pro', desc:'Nano Banana Pro',glyph:'✦',tint:'#a78bfa'},
  ];
  return(<div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:6}}>{models.map(m=>(<Card key={m.id} active={value===m.id} onClick={()=>onChange(m.id)} padding="11px 6px"><div style={{width:26,height:26,borderRadius:7,background:m.tint+'1a',color:m.tint,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,marginBottom:4}}>{m.glyph}</div><div style={{fontSize:11.5,fontWeight:500}}>{m.name}</div><div style={{fontSize:10,color:'var(--text-3)'}}>{m.desc}</div></Card>))}</div>);
};

// Supported aspect ratios — order matters for tie-breaking
const SUPPORTED_RATIOS=[
  {id:'1:1', r:1,       desc:'Square'},
  {id:'16:9',r:16/9,    desc:'Wide'},
  {id:'9:16',r:9/16,    desc:'Portrait'},
  {id:'4:3', r:4/3,     desc:'Classic'},
  {id:'3:4', r:3/4,     desc:'Portrait 3:4'},
];
function nearestRatio(w,h){
  const r=w/h;
  return SUPPORTED_RATIOS.reduce((best,cur)=>Math.abs(cur.r-r)<Math.abs(best.r-r)?cur:best).id;
}

// Resize an uploaded image to ≤1024px and return {base64, mime, preview, name, detectedRatio}
function processImageFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=reject;
    reader.onload=e=>{
      const img=new Image();
      img.onerror=reject;
      img.onload=()=>{
        const MAX=1024;
        let {width:w,height:h}=img;
        const detectedRatio=nearestRatio(w,h);
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h/w*MAX);w=MAX;}else{w=Math.round(w/h*MAX);h=MAX;}}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const preview=canvas.toDataURL('image/jpeg',0.85);
        resolve({base64:preview.split(',')[1],mime:'image/jpeg',preview,name:file.name,width:w,height:h,detectedRatio});
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

const Sidebar=({state,set})=>{
  const[negOpen,setNegOpen]=React.useState(false);
  const[locOpen,setLocOpen]=React.useState(true);
  const fileRef=React.useRef(null);

  React.useEffect(()=>{if(state.locEnabled)setLocOpen(true);},[state.locEnabled]);

  const handleFile=async file=>{
    if(!file)return;
    try{
      const r=await processImageFile(file);
      set({refImage:true,refImageData:r.base64,refImageMime:r.mime,refImagePreview:r.preview,refImageName:r.name,ratio:r.detectedRatio});
    }catch(e){console.error('Upload error',e);}
  };

  const onDrop=e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))handleFile(f);};
  const onDragOver=e=>e.preventDefault();

  const PRESET_MAP={africa:'Africa',philippines:'Philippines',us:'United States'};
  const applyPreset=v=>{
    if(!v)return;
    const label=PRESET_MAP[v]||v;
    if(state.locMulti){if(!state.locRegions.includes(label))set({locRegions:[...state.locRegions,label]});}
    else set({locRegion:label});
  };

  const STYLE_MAP=[
    {id:'cctv',     label:'CCTV / Security',  prompt:'Low-resolution high-angle surveillance footage, heavy digital noise, monochrome black and white, horizontal scan lines, overlaid technical date/time stamps in the corner'},
    {id:'ugc',      label:'Smartphone Casual', prompt:'taken on a mobile phone, amateur photography, unprocessed, natural lighting, slight motion blur'},
    {id:'film35',   label:'35mm Film',         prompt:'shot on 35mm film, visible film grain, analog color science, slight chromatic aberration, natural color cast, imperfect focus, muted tones'},
    {id:'tungsten', label:'Night / Tungsten',  prompt:'low light environment, ambient tungsten lighting, warm orange shadows, underexposed, natural grain, no flash, available light only'},
    {id:'editorial',label:'Editorial',         prompt:'editorial portrait photography, clean sharp focus, professional composition, controlled natural directional light, magazine quality'},
  ];
  const ratios=SUPPORTED_RATIOS;

  return(
    <aside style={{width:320,background:'var(--bg-1)',borderRight:'1px solid var(--line-1)',display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{flex:1,overflowY:'auto',padding:'18px 18px 4px'}}>

        {/* Mode tabs */}
        <div style={{display:'flex',background:'var(--bg-2)',border:'1px solid var(--line-1)',borderRadius:8,padding:3,gap:3,marginBottom:18}}>
          {[{id:'generate',label:'Generate',glyph:<Icon.Sparkle size={12} sw={1.7}/>},{id:'variations',label:'Variations',glyph:<Icon.Layers size={12} sw={1.7}/>}].map(t=>(
            <button key={t.id} onClick={()=>set({mode:t.id})} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'7px 0',borderRadius:6,fontSize:12,fontWeight:500,background:state.mode===t.id?'var(--bg-3)':'transparent',color:state.mode===t.id?'var(--text-1)':'var(--text-3)',boxShadow:state.mode===t.id?'0 1px 4px #0006':'none',transition:'all .15s'}}>{t.glyph}{t.label}</button>
          ))}
        </div>

        <Section label="Model"><ModelGrid value={state.model} onChange={v=>set({model:v})}/></Section>

        {state.mode==='generate'&&(<>
          <Section label="Style">
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {STYLE_MAP.map(s=><Pill key={s.id} active={state.style===s.id} onClick={()=>set({style:state.style===s.id?'':s.id})}>{s.label}</Pill>)}
            </div>
          </Section>
          <Section label="Prompt" right={<span className="mono" style={{fontSize:10,color:'var(--text-3)'}}>{state.prompt.length}/400</span>}>
            <Field rows={4} placeholder="A character portrait of…" value={state.prompt} onChange={e=>set({prompt:e.target.value.slice(0,400)})}/>
            <button onClick={()=>setNegOpen(!negOpen)} style={{fontSize:11,color:'var(--text-3)',marginTop:6,padding:0}}>{negOpen?'−':'+'}  Negative prompt</button>
            {negOpen&&<div style={{marginTop:6}}><Field rows={2} placeholder="What to avoid…"/></div>}
          </Section>
          <Section label="Aspect Ratio">
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}}>
              {ratios.map(r=><Card key={r.id} active={state.ratio===r.id} onClick={()=>set({ratio:r.id})} padding="9px 4px"><div className="mono" style={{fontSize:11,fontWeight:500}}>{r.id}</div><div style={{fontSize:10,color:'var(--text-3)'}}>{r.desc}</div></Card>)}
            </div>
          </Section>
          <Section label="Guidance" hint="How closely to follow the prompt vs. let the model interpret.">
            <Slider value={state.cfg} onChange={v=>set({cfg:v})} min={1} max={20} leftLabel="Loose" rightLabel="Strict"/>
          </Section>
        </>)}

        {state.mode==='variations'&&(<>
          {/* Reference image upload */}
          <Section label="Reference Image">
            <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/webp" style={{display:'none'}}
              onChange={e=>{const f=e.target.files[0];if(f)handleFile(f);e.target.value='';}}/>
            <div onClick={()=>fileRef.current?.click()} onDrop={onDrop} onDragOver={onDragOver}
              style={{width:'100%',border:'1.5px dashed var(--line-3)',borderRadius:10,background:'var(--bg-2)',padding:state.refImage?0:18,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:6,transition:'all .15s',overflow:'hidden'}}>
              {!state.refImage?(
                <><div style={{color:'var(--text-3)'}}><Icon.Upload size={22} sw={1.4}/></div>
                <div style={{fontSize:12,color:'var(--text-2)'}}>Drop image or click to upload</div>
                <div className="mono" style={{fontSize:10,color:'var(--text-4)'}}>PNG · JPG · WEBP — max 10MB</div></>
              ):(
                <div style={{width:'100%',position:'relative'}}>
                  <img src={state.refImagePreview} alt="Reference" style={{width:'100%',maxHeight:120,objectFit:'cover',display:'block',borderRadius:8}}/>
                  <button onClick={e=>{e.stopPropagation();set({refImage:false,refImageData:null,refImageMime:null,refImagePreview:null,refImageName:null});}}
                    style={{position:'absolute',top:6,right:6,width:22,height:22,borderRadius:5,background:'#00000090',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
                    <Icon.Close size={10} sw={2}/>
                  </button>
                  <div className="mono" style={{position:'absolute',left:8,bottom:8,fontSize:9.5,color:'#ffffffaa',background:'#00000060',padding:'2px 6px',borderRadius:4}}>{state.refImageName||'reference.jpg'}</div>
                </div>
              )}
            </div>
          </Section>

          <Section label="Story Context" right={<span className="mono" style={{fontSize:10,color:'var(--text-3)'}}>{state.context.split(/\s+/).filter(Boolean).length}/600</span>}>
            <Field rows={3} placeholder="Describe the scene, mood, or narrative…" value={state.context} onChange={e=>set({context:e.target.value})}/>
          </Section>
          <Section label="Aspect Ratio" right={state.refImage&&<span className="mono" style={{fontSize:9,padding:'2px 7px',borderRadius:999,background:'var(--accent-soft)',border:'1px solid var(--accent-line)',color:'var(--accent)'}}>AUTO</span>}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}}>
              {ratios.map(r=><Card key={r.id} active={state.ratio===r.id} onClick={()=>set({ratio:r.id})} padding="9px 4px"><div className="mono" style={{fontSize:11,fontWeight:500}}>{r.id}</div><div style={{fontSize:10,color:'var(--text-3)'}}>{r.desc}</div></Card>)}
            </div>
            {state.refImage&&<div style={{fontSize:10.5,color:'var(--text-3)',marginTop:7}}>Detected from reference image · override by tapping a ratio above</div>}
          </Section>
          <Section label="Divergence" hint={state.divergence<20?'Subtle shifts only':state.divergence<50?'Balanced variations':state.divergence<80?'Major reinterpretation':'Full reimagination'}>
            <Slider value={state.divergence} onChange={v=>set({divergence:v})} leftLabel="Subtle" rightLabel="Wild"/>
          </Section>
          <Section label="Variation Type">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              {[{id:'alternatives',name:'Alternatives',desc:'Different compositions'},{id:'variations',name:'Variations',desc:'Same composition'}].map(v=>(
                <Card key={v.id} active={state.varType===v.id} onClick={()=>set({varType:v.id})} padding="10px 8px">
                  <div style={{fontSize:11.5,fontWeight:500}}>{v.name}</div>
                  <div style={{fontSize:10,color:'var(--text-3)'}}>{v.desc}</div>
                </Card>
              ))}
            </div>
          </Section>

        </>)}

        {/* Localization */}
        <div style={{border:'1px solid',borderColor:state.locEnabled?'var(--accent-line)':'var(--line-1)',background:state.locEnabled?'var(--accent-soft)':'var(--bg-2)',borderRadius:10,marginBottom:18,overflow:'hidden',transition:'all .2s'}}>
          <div onClick={()=>setLocOpen(!locOpen)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 13px',cursor:'pointer',userSelect:'none'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{color:state.locEnabled?'var(--accent)':'var(--text-2)'}}><Icon.Globe size={14}/></span>
              <span style={{fontSize:13,fontWeight:600,color:'var(--text-1)'}}>Localization / Ethnicity</span>
              {state.locEnabled&&<span className="mono" style={{fontSize:9.5,padding:'2px 7px',borderRadius:999,background:'var(--accent-soft)',border:'1px solid var(--accent-line)',color:'var(--accent)'}}>ACTIVE</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}} onClick={e=>e.stopPropagation()}>
              <Toggle value={state.locEnabled} onChange={v=>set({locEnabled:v})} options={[{value:false,label:'Off'},{value:true,label:'On'}]}/>
              <span style={{color:'var(--text-3)',transform:locOpen?'rotate(180deg)':'none',transition:'transform .15s'}}><Icon.Chevron size={12}/></span>
            </div>
          </div>
          {locOpen&&(
            <div style={{padding:'0 13px 13px',display:'flex',flexDirection:'column',gap:12}}>
              <div>
                <div style={{fontSize:9.5,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:6}}>Text Handling</div>
                <SSelect value={state.locTextHandling} onChange={v=>set({locTextHandling:v})}>
                  <option value="leave">Leave original text</option>
                  <option value="translate">Auto-translate text</option>
                  <option value="localize">Localize copy (rewrite for region)</option>
                  <option value="remove">Remove all text</option>
                </SSelect>
              </div>
              <div>
                <div style={{fontSize:9.5,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:6}}>Region Preset</div>
                <SSelect value="" onChange={applyPreset}>
                  <option value="">Select a preset…</option>
                  <option value="africa">Africa</option>
                  <option value="philippines">Philippines</option>
                  <option value="us">United States</option>
                </SSelect>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{fontSize:12,color:'var(--text-2)'}}>Multiple regions</span>
                <Toggle value={state.locMulti} onChange={v=>set({locMulti:v})} options={[{value:false,label:'No'},{value:true,label:'Yes'}]}/>
              </div>
              {!state.locMulti?(
                <div>
                  <div style={{fontSize:9.5,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:6}}>Region / Ethnicity</div>
                  <SInput value={state.locRegion} onChange={e=>set({locRegion:e.target.value})} placeholder="e.g. Philippines, Nigerian, Brazilian…"/>
                  {state.locEnabled&&state.locRegion&&(
                    <div style={{display:'flex',alignItems:'center',gap:6,marginTop:7,padding:'7px 10px',borderRadius:7,background:'#7aa2ff0a',border:'1px solid var(--accent-line)'}}>
                      <span style={{color:'var(--accent)',flexShrink:0}}><Icon.Sparkle size={11}/></span>
                      <span style={{fontSize:10.5,color:'var(--text-3)',lineHeight:1.4}}>Ethnicity swap active — divergence clamped to <span style={{color:'var(--accent)',fontWeight:500}}>40–55</span> to preserve pose</span>
                    </div>
                  )}
                </div>
              ):(
                <div>
                  <div style={{fontSize:9.5,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:6}}>Regions</div>
                  <SInput placeholder="Type and press Enter…" onKeyDown={e=>{if(e.key==='Enter'&&e.currentTarget.value.trim()){const v=e.currentTarget.value.trim();if(!state.locRegions.includes(v))set({locRegions:[...state.locRegions,v]});e.currentTarget.value='';}}}/>
                  <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:8}}>
                    {state.locRegions.map((t,i)=>(
                      <span key={i} style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,padding:'3px 4px 3px 9px',borderRadius:999,background:'var(--bg-3)',border:'1px solid var(--line-1)',color:'var(--text-2)'}}>
                        {t}<button onClick={()=>set({locRegions:state.locRegions.filter((_,j)=>j!==i)})} style={{width:14,height:14,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-3)',borderRadius:999}}><Icon.Close size={9} sw={2}/></button>
                      </span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Footer */}
      <div style={{borderTop:'1px solid var(--line-1)',padding:16,background:'var(--bg-1)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <span style={{fontSize:11.5,color:'var(--text-2)'}}>Count</span>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <button onClick={()=>set({count:Math.max(1,state.count-1)})} style={{width:26,height:26,borderRadius:6,border:'1px solid var(--line-1)',background:'var(--bg-2)',color:'var(--text-2)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon.Minus size={11} sw={2}/></button>
            <span className="mono" style={{fontSize:13,fontWeight:500,width:28,textAlign:'center'}}>{state.count}</span>
            <button onClick={()=>set({count:Math.min(4,state.count+1)})} style={{width:26,height:26,borderRadius:6,border:'1px solid var(--line-1)',background:'var(--bg-2)',color:'var(--text-2)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon.Plus size={11} sw={2}/></button>
          </div>
        </div>
        {(()=>{const cost=state.count*3;const notEnough=state.credits<cost&&!state.generating;return(<>
        <button onClick={()=>state.generate()} disabled={state.generating||notEnough} style={{width:'100%',padding:'12px',borderRadius:9,background:state.generating?'var(--bg-3)':notEnough?'var(--bg-3)':'linear-gradient(180deg,#8eb4ff,#5e8cff)',color:state.generating||notEnough?'var(--text-3)':'#0a0e1c',fontSize:13.5,fontWeight:600,letterSpacing:'-.01em',display:'flex',alignItems:'center',justifyContent:'center',gap:7,cursor:state.generating?'wait':notEnough?'not-allowed':'pointer',boxShadow:state.generating||notEnough?'none':'0 1px 0 #ffffff40 inset,0 8px 24px #5e8cff30',transition:'all .15s'}}>
          {state.generating?(<><span style={{width:12,height:12,border:'2px solid #ffffff30',borderTopColor:'var(--text-2)',borderRadius:'50%',display:'inline-block',animation:'spin .7s linear infinite'}}/> Generating…</>):notEnough?(<><Icon.AlertCircle size={13}/> Not enough credits</>):(<><Icon.Sparkle size={13} sw={2}/> Generate {state.count} {state.mode==='variations'?'Variation':'Image'}{state.count>1?'s':''}</>)}
        </button>
        <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:9}}>
          <span className="mono" style={{fontSize:10,color:notEnough?'var(--danger)':'var(--text-3)'}}>−{cost} credits</span>
          <span style={{fontSize:10,color:'var(--text-4)'}}>·</span>
          <span className="mono" style={{fontSize:10,color:'var(--text-3)'}}>~{Math.round(state.count*2.5)}s</span>
          <span style={{fontSize:10,color:'var(--text-4)'}}>·</span>
          <span className="mono" style={{fontSize:10,color:notEnough?'var(--danger)':'var(--text-3)'}}>{state.credits} left</span>
        </div>
        </>);})()}
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </aside>
  );
};
window.Sidebar=Sidebar;
</script>

<!-- ═══════════ RESULTS ═══════════ -->
<script type="text/babel">
const ratioToAspect=r=>({'1:1':'1/1','16:9':'16/9','9:16':'9/16','4:3':'4/3','3:4':'3/4'}[r]||'1/1');
const iconBtnStyle=active=>({width:24,height:24,borderRadius:5,background:active?'var(--accent-soft)':'#00000080',border:'1px solid',borderColor:active?'var(--accent-line)':'#ffffff20',color:active?'var(--accent)':'#fff',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center'});

const ImageCard=({image,ratio,selected,onSelect,onIterate,onPin,onSaveToLib,onRemove,onCompare,original})=>{
  const[hover,setHover]=React.useState(false);
  const[imgError,setImgError]=React.useState(false);
  const src=image.data?`data:${image.mimeType||'image/png'};base64,${image.data}`:null;
  return(
    <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} style={{position:'relative',borderRadius:10,overflow:'hidden',border:'1px solid',borderColor:selected?'var(--accent-line)':'var(--line-1)',background:'var(--bg-2)',boxShadow:selected?'0 0 0 1px var(--accent-line),0 0 32px #7aa2ff20':'none',transition:'border-color .15s,box-shadow .15s'}}>
      <div style={{aspectRatio:ratioToAspect(ratio),background:imgError||!src?'linear-gradient(135deg,#1f2a4f,#4a3270)':'#000',position:'relative',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
        {src&&!imgError?(
          <img src={src} alt="Generated" onError={()=>setImgError(true)} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
        ):(
          <div style={{width:'55%',height:'70%',borderRadius:'45% 45% 40% 40%',background:'radial-gradient(ellipse at 50% 35%,#ffffff14,transparent 70%)',marginTop:'8%'}}/>
        )}

        {/* Select checkbox */}
        <button onClick={onSelect} style={{position:'absolute',top:9,left:9,width:20,height:20,borderRadius:5,border:'1px solid',borderColor:selected?'var(--accent)':'#ffffff40',background:selected?'var(--accent)':'#00000060',backdropFilter:'blur(6px)',color:'#0a0e1c',display:'flex',alignItems:'center',justifyContent:'center',opacity:hover||selected?1:0,transition:'opacity .15s,background .15s'}}>
          {selected&&<Icon.Check size={12} sw={3}/>}
        </button>

        {original?(
          <span className="mono" style={{position:'absolute',top:9,right:9,fontSize:9.5,padding:'3px 8px',borderRadius:999,background:'#00000080',color:'#fff',backdropFilter:'blur(6px)',letterSpacing:'.06em'}}>ORIGINAL</span>
        ):(
          <div style={{position:'absolute',top:9,right:9,display:'flex',gap:4,opacity:hover?1:0,transition:'opacity .15s'}}>
            <button onClick={()=>{onPin();if(!image.pinned&&onSaveToLib)onSaveToLib(image);}} title={image.pinned?'Unpin (saved to Library)':'Pin to Library'} style={iconBtnStyle(image.pinned)}><Icon.Star size={12} fill={image.pinned?'currentColor':'none'}/></button>
            <button onClick={onCompare} title="Compare" style={iconBtnStyle(false)}><Icon.Compare size={12}/></button>
          </div>
        )}

        {!original&&(
          <div style={{position:'absolute',left:0,right:0,bottom:0,padding:'24px 10px 10px',background:'linear-gradient(to top,#000000bb,transparent)',display:'flex',alignItems:'flex-end',justifyContent:'space-between',opacity:hover?1:0,transition:'opacity .15s'}}>
            <span className="mono" style={{fontSize:9.5,color:'#ffffffaa'}}>seed {image.seed}</span>
            <div style={{display:'flex',gap:4}}>
              <button onClick={onIterate} title="Iterate from this" style={{...iconBtnStyle(false),background:'var(--accent)',color:'#0a0e1c',border:'1px solid var(--accent)'}}><Icon.Branch size={12} sw={2}/></button>
              <button title="Download" onClick={()=>{if(!src)return;const a=document.createElement('a');a.href=src;a.download=`drama-pics-${image.seed}.png`;a.click();}} style={iconBtnStyle(false)}><Icon.Download size={12}/></button>
              <button onClick={onRemove} title="Delete" style={iconBtnStyle(false)}><Icon.Close size={12} sw={2}/></button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const SkeletonCard=({ratio})=>(<div style={{aspectRatio:ratioToAspect(ratio),borderRadius:10,background:'linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.4s infinite',border:'1px solid var(--line-1)'}}/>);

const Empty=()=>(<div style={{gridColumn:'1/-1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 20px',gap:14}}><div style={{width:56,height:56,borderRadius:14,border:'1.5px dashed var(--line-3)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-3)'}}><Icon.Image size={22} sw={1.4}/></div><div style={{textAlign:'center'}}><div className="display" style={{fontSize:18,color:'var(--text-1)',marginBottom:4}}>Nothing here yet</div><div style={{fontSize:12.5,color:'var(--text-3)',maxWidth:280,lineHeight:1.5}}>Add a prompt or reference image, then hit Generate. Variations will land side-by-side with the original.</div></div></div>);

const subtleBtn={flex:1,fontSize:11,padding:'6px 8px',borderRadius:6,border:'1px solid var(--line-1)',background:'var(--bg-2)',color:'var(--text-2)',display:'flex',alignItems:'center',justifyContent:'center',gap:5};
const batchBtn={fontSize:11.5,padding:'6px 10px',borderRadius:7,display:'flex',alignItems:'center',gap:6,color:'var(--text-1)',background:'var(--bg-2)',border:'1px solid var(--line-1)'};

const ColCountIcon=({n})=>(<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">{Array.from({length:n}).map((_,i)=>{const w=(14-(n-1)*2)/n;return<rect key={i} x={i*(w+2)} y="2" width={w} height="10" rx="1"/>;})}</svg>);
const ViewToggle=({value,onChange})=>(<div style={{display:'flex',background:'var(--bg-2)',border:'1px solid var(--line-1)',borderRadius:7,padding:2}}>{[{id:'compact',n:4},{id:'default',n:3},{id:'wide',n:2}].map(o=>(<button key={o.id} onClick={()=>onChange(o.id)} style={{width:28,height:24,borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',background:value===o.id?'var(--bg-3)':'transparent',color:value===o.id?'var(--text-1)':'var(--text-3)'}}><ColCountIcon n={o.n}/></button>))}</div>);

const ToolbarBtn=({children,icon,onClick,danger})=>{
  const[h,setH]=React.useState(false);
  return(<button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{fontSize:11.5,padding:'6px 11px',borderRadius:7,display:'flex',alignItems:'center',gap:6,border:'1px solid',borderColor:h?(danger?'#f8717155':'var(--line-2)'):'var(--line-1)',background:h?(danger?'#f871710f':'var(--bg-2)'):'transparent',color:h?(danger?'var(--danger)':'var(--text-1)'):'var(--text-2)',transition:'all .12s'}}>{icon}{children}</button>);
};

const Grid=({state,results,generating,ratio,select,togglePin,remove,set,view})=>{
  const cols=view==='compact'?'repeat(4,1fr)':view==='wide'?'repeat(2,1fr)':'repeat(3,1fr)';
  return(<div style={{display:'grid',gridTemplateColumns:cols,gap:12,alignContent:'start'}}>
    {results.map(img=>(<ImageCard key={img.id} image={img} ratio={ratio} selected={state.selected.includes(img.id)} onSelect={()=>select(img.id)} onPin={()=>togglePin(img.id)} onSaveToLib={state.saveToLibrary} onRemove={()=>remove(img.id)} onIterate={()=>state.iterateFrom(img)} onCompare={()=>{}}/>))}
    {generating&&Array.from({length:state.count}).map((_,i)=>(<SkeletonCard key={'sk'+i} ratio={ratio}/>))}
  </div>);
};

const Results=({state,set})=>{
  const{results,generating,ratio,mode,refImage}=state;
  const showOriginal=mode==='variations'&&refImage&&(results.length>0||generating);
  const select=id=>{const s=new Set(state.selected);s.has(id)?s.delete(id):s.add(id);set({selected:[...s]});};
  const toggleAll=()=>{if(state.selected.length===results.length)set({selected:[]});else set({selected:results.map(r=>r.id)});};
  const removeSelected=()=>set({results:results.filter(r=>!state.selected.includes(r.id)),selected:[]});
  const togglePin=id=>set({results:results.map(r=>r.id===id?{...r,pinned:!r.pinned}:r)});
  const remove=id=>set({results:results.filter(r=>r.id!==id),selected:state.selected.filter(s=>s!==id)});

  return(
    <main style={{flex:1,display:'flex',flexDirection:'column',background:'var(--bg-0)',overflow:'hidden',position:'relative'}}>
      {/* Header */}
      <div style={{padding:'14px 22px',borderBottom:'1px solid var(--line-1)',display:'flex',alignItems:'center',gap:10,background:'var(--bg-1)'}}>
        <span className="display" style={{fontSize:16,color:'var(--text-1)'}}>{mode==='variations'?'Variations':'Results'}</span>
        <span className="mono" style={{fontSize:10.5,color:'var(--text-3)',padding:'2px 8px',borderRadius:999,border:'1px solid var(--line-1)',background:'var(--bg-2)'}}>{results.length} {results.length===1?'image':'images'}</span>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
          <ViewToggle value={state.view} onChange={v=>set({view:v})}/>
          <div style={{width:1,height:18,background:'var(--line-1)',margin:'0 4px'}}/>
          <ToolbarBtn onClick={()=>state.regenAll()} icon={<Icon.Refresh size={12}/>}>Regenerate all</ToolbarBtn>
          <ToolbarBtn icon={<Icon.Download size={12}/>}>Save all</ToolbarBtn>
          <ToolbarBtn onClick={()=>set({results:[],selected:[],error:null})} icon={<Icon.Trash size={12}/>} danger>Clear</ToolbarBtn>
        </div>
      </div>

      {/* Error banner */}
      {state.error&&(
        <div style={{margin:'12px 22px 0',padding:'10px 14px',borderRadius:8,background:'#f871710f',border:'1px solid #f8717155',display:'flex',alignItems:'center',gap:10,color:'var(--danger)'}}>
          <Icon.AlertCircle size={14}/>
          <span style={{fontSize:12,flex:1}}>{state.error}</span>
          <button onClick={()=>set({error:null})} style={{color:'var(--danger)'}}><Icon.Close size={12} sw={2}/></button>
        </div>
      )}

      {/* Body */}
      <div style={{flex:1,overflowY:'auto',padding:showOriginal?0:'22px'}}>
        {!generating&&results.length===0?(
          <Empty/>
        ):showOriginal?(
          <div style={{display:'grid',gridTemplateColumns:'260px 1fr',height:'100%'}}>
            {/* Original strip */}
            <div style={{borderRight:'1px solid var(--line-1)',padding:'22px 18px',display:'flex',flexDirection:'column',gap:12,background:'var(--bg-1)',overflowY:'auto'}}>
              <div style={{fontSize:10,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-3)'}}>Original</div>
              <div style={{position:'relative',borderRadius:10,overflow:'hidden',border:'1px solid var(--line-2)'}}>
                {state.refImagePreview?(
                  <img src={state.refImagePreview} alt="Original" style={{width:'100%',maxHeight:200,objectFit:'cover',display:'block'}}/>
                ):(
                  <div style={{aspectRatio:ratioToAspect(ratio),background:'linear-gradient(135deg,#1f2540,#4a3a6e 50%,#6b4564)',position:'relative'}}>
                    <div style={{width:'55%',height:'70%',borderRadius:'45% 45% 40% 40%',background:'radial-gradient(ellipse at 50% 35%,#ffffff20,transparent 70%)',position:'absolute',top:'12%',left:'22%'}}/>
                    <span className="mono" style={{position:'absolute',top:9,left:9,fontSize:9.5,padding:'3px 8px',borderRadius:999,background:'#00000080',color:'#fff',backdropFilter:'blur(6px)',letterSpacing:'.06em'}}>ORIGINAL</span>
                  </div>
                )}
              </div>
              {state.refImageName&&<div className="mono" style={{fontSize:10,color:'var(--text-3)',lineHeight:1.6}}><div>{state.refImageName}</div></div>}
              <div style={{marginTop:4,padding:'10px 12px',borderRadius:8,background:'var(--bg-2)',border:'1px solid var(--line-1)',fontSize:11.5,color:'var(--text-2)',lineHeight:1.55}}>
                <div style={{fontSize:9.5,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:5}}>Context</div>
                <div>{state.context||'No context set.'}</div>
              </div>
            </div>
            {/* Variations grid */}
            <div style={{padding:22,overflowY:'auto'}}>
              <Grid {...{state,results,generating,ratio,select,togglePin,remove,set,view:state.view}}/>
            </div>
          </div>
        ):(
          <Grid {...{state,results,generating,ratio,select,togglePin,remove,set,view:state.view}}/>
        )}
      </div>

      {/* Batch bar */}
      {state.selected.length>0&&(
        <div style={{position:'absolute',left:'50%',bottom:22,transform:'translateX(-50%)',background:'var(--bg-3)',border:'1px solid var(--line-2)',borderRadius:12,padding:'8px 8px 8px 16px',display:'flex',alignItems:'center',gap:12,boxShadow:'0 12px 40px #00000080,0 0 0 1px #ffffff08',backdropFilter:'blur(20px)',animation:'slideUp .2s ease-out'}}>
          <span style={{fontSize:12.5,color:'var(--text-1)'}}><span className="mono" style={{color:'var(--accent)',fontWeight:600}}>{state.selected.length}</span> selected</span>
          <button onClick={toggleAll} style={{fontSize:11.5,color:'var(--text-3)',padding:0}}>{state.selected.length===results.length?'Clear':'Select all'}</button>
          <div style={{width:1,height:18,background:'var(--line-1)'}}/>
          <button style={batchBtn}><Icon.Download size={12}/> Save</button>
          <button onClick={()=>{if(state.selected.length===1){const img=results.find(r=>r.id===state.selected[0]);if(img)state.iterateFrom(img);}}} style={batchBtn}><Icon.Branch size={12}/> Iterate</button>
          <button onClick={()=>set({results:results.map(r=>state.selected.includes(r.id)?{...r,pinned:true}:r)})} style={batchBtn}><Icon.Star size={12}/> Pin</button>
          <button onClick={removeSelected} style={{...batchBtn,color:'var(--danger)'}}><Icon.Trash size={12}/> Delete</button>
          <button onClick={()=>set({selected:[]})} style={{width:26,height:26,borderRadius:6,color:'var(--text-3)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon.Close size={12}/></button>
        </div>
      )}

      <style>{`
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        @keyframes slideUp{from{transform:translate(-50%,12px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
      `}</style>
    </main>
  );
};
window.Results=Results;

/* ── History & Library views ── */
const timeAgo=t=>{const s=Math.floor((Date.now()-t)/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';};

const MediaCard=({item,onUseAsRef,onSave,onRemove,saveLabel='Save to Library'})=>{
  const[hover,setHover]=React.useState(false);
  const src=item.data?`data:${item.mimeType||'image/png'};base64,${item.data}`:null;
  return(
    <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} style={{borderRadius:10,overflow:'hidden',border:'1px solid var(--line-1)',background:'var(--bg-2)'}}>
      <div style={{aspectRatio:'1/1',background:'linear-gradient(135deg,#1f2a4f,#4a3270)',position:'relative',overflow:'hidden'}}>
        {src&&<img src={src} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>}
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,#000000cc,transparent 50%)',opacity:hover?1:0,transition:'opacity .15s',padding:10,display:'flex',flexDirection:'column',justifyContent:'flex-end',gap:5}}>
          <div style={{display:'flex',gap:4}}>
            <button onClick={()=>onUseAsRef(item)} style={{flex:1,padding:'6px',borderRadius:6,background:'var(--accent)',color:'#0a0e1c',fontSize:11,fontWeight:600,border:'none',cursor:'pointer'}}>Use as ref</button>
            {onSave&&<button onClick={()=>onSave(item)} style={{padding:'6px 8px',borderRadius:6,background:'#ffffff20',color:'#fff',fontSize:11,border:'none',cursor:'pointer',backdropFilter:'blur(6px)'}}><Icon.Star size={12}/></button>}
            {onRemove&&<button onClick={()=>onRemove(item)} style={{padding:'6px 8px',borderRadius:6,background:'#f871710f',color:'var(--danger)',fontSize:11,border:'1px solid #f8717155',cursor:'pointer'}}><Icon.Trash size={12}/></button>}
            <button title="Download" onClick={()=>{if(!src)return;const a=document.createElement('a');a.href=src;a.download=`drama-${item.id||Date.now()}.png`;a.click();}} style={{...iconBtnStyle(false),background:'#00000060'}}><Icon.Download size={12}/></button>
          </div>
        </div>
      </div>
      <div style={{padding:'8px 10px'}}>
        <div style={{fontSize:11,color:'var(--text-2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.label||item.prompt||item.context||'(no prompt)'}</div>
        <div style={{fontSize:10,color:'var(--text-4)',marginTop:2,display:'flex',gap:6}}><span>{timeAgo(item.timestamp)}</span><span>·</span><span>{item.model==='pro'?'Pro':'Fast'}</span></div>
      </div>
    </div>
  );
};

const HistoryView=({state,set})=>{
  const h=state.history||[];
  const useAsRef=item=>set({nav:'workspace',mode:'variations',refImage:true,refImageData:item.data,refImageMime:item.mimeType,refImagePreview:`data:${item.mimeType||'image/png'};base64,${item.data}`,refImageName:'from-history.jpg'});
  const saveToLib=item=>{
    const lib=[{...item,timestamp:item.timestamp||Date.now()},...(state.library||[]).filter(l=>l.id!==item.id)];
    set({library:lib});
    try{localStorage.setItem('drama_library',JSON.stringify(lib));}catch(e){}
  };
  return(
    <main style={{flex:1,display:'flex',flexDirection:'column',background:'var(--bg-0)',overflow:'hidden'}}>
      <div style={{padding:'14px 22px',borderBottom:'1px solid var(--line-1)',display:'flex',alignItems:'center',gap:10,background:'var(--bg-1)'}}>
        <span className="display" style={{fontSize:16,color:'var(--text-1)'}}>History</span>
        <span className="mono" style={{fontSize:10.5,color:'var(--text-3)',padding:'2px 8px',borderRadius:999,border:'1px solid var(--line-1)',background:'var(--bg-2)'}}>{h.length} items</span>
        {h.length>0&&<button onClick={()=>{set({history:[]});try{localStorage.removeItem('drama_history');}catch(e){}}} style={{marginLeft:'auto',fontSize:11,color:'var(--text-3)',padding:'4px 10px',borderRadius:6,border:'1px solid var(--line-1)',background:'var(--bg-2)'}}>Clear history</button>}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:22}}>
        {h.length===0?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14}}>
            <div style={{width:56,height:56,borderRadius:14,border:'1.5px dashed var(--line-3)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-3)'}}><Icon.Layers size={22} sw={1.4}/></div>
            <div style={{textAlign:'center'}}><div className="display" style={{fontSize:18,color:'var(--text-1)',marginBottom:4}}>No history yet</div><div style={{fontSize:12.5,color:'var(--text-3)',lineHeight:1.5}}>Images you generate appear here automatically.</div></div>
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,alignContent:'start'}}>
            {h.map(item=><MediaCard key={item.id} item={item} onUseAsRef={useAsRef} onSave={saveToLib}/>)}
          </div>
        )}
      </div>
    </main>
  );
};

const LibraryView=({state,set})=>{
  const lib=state.library||[];
  const useAsRef=item=>set({nav:'workspace',mode:'variations',refImage:true,refImageData:item.data,refImageMime:item.mimeType,refImagePreview:`data:${item.mimeType||'image/png'};base64,${item.data}`,refImageName:'from-library.jpg'});
  const remove=item=>{
    const next=lib.filter(l=>l.id!==item.id);
    set({library:next});
    try{localStorage.setItem('drama_library',JSON.stringify(next));}catch(e){}
  };
  return(
    <main style={{flex:1,display:'flex',flexDirection:'column',background:'var(--bg-0)',overflow:'hidden'}}>
      <div style={{padding:'14px 22px',borderBottom:'1px solid var(--line-1)',display:'flex',alignItems:'center',gap:10,background:'var(--bg-1)'}}>
        <span className="display" style={{fontSize:16,color:'var(--text-1)'}}>Library</span>
        <span className="mono" style={{fontSize:10.5,color:'var(--text-3)',padding:'2px 8px',borderRadius:999,border:'1px solid var(--line-1)',background:'var(--bg-2)'}}>{lib.length} saved</span>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:22}}>
        {lib.length===0?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14}}>
            <div style={{width:56,height:56,borderRadius:14,border:'1.5px dashed var(--line-3)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-3)'}}><Icon.Star size={22} sw={1.4}/></div>
            <div style={{textAlign:'center'}}><div className="display" style={{fontSize:18,color:'var(--text-1)',marginBottom:4}}>Library is empty</div><div style={{fontSize:12.5,color:'var(--text-3)',lineHeight:1.5}}>Pin images from Workspace to save them here.</div></div>
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,alignContent:'start'}}>
            {lib.map(item=><MediaCard key={item.id} item={item} onUseAsRef={useAsRef} onRemove={remove}/>)}
          </div>
        )}
      </div>
    </main>
  );
};
window.HistoryView=HistoryView;
window.LibraryView=LibraryView;
</script>

<!-- ═══════════ APP ═══════════ -->
<script type="text/babel">
const FONT_PAIRS={
  'inter-jetbrains': {ui:'Inter',        display:'Inter',           mono:'JetBrains Mono',w:600,t:'-0.02em', label:'Inter / JetBrains Mono'},
  'geist':           {ui:'Geist',        display:'Geist',           mono:'Geist Mono',    w:600,t:'-0.025em',label:'Geist / Geist Mono'},
  'space-grotesk':   {ui:'Space Grotesk',display:'Space Grotesk',   mono:'JetBrains Mono',w:600,t:'-0.02em', label:'Space Grotesk'},
  'ibm-plex':        {ui:'IBM Plex Sans',display:'IBM Plex Sans',   mono:'IBM Plex Mono', w:600,t:'-0.015em',label:'IBM Plex'},
  'manrope-mono':    {ui:'Manrope',      display:'Manrope',         mono:'JetBrains Mono',w:700,t:'-0.025em',label:'Manrope / JetBrains'},
  'instrument-serif':{ui:'Inter',        display:'Instrument Serif',mono:'JetBrains Mono',w:400,t:'-0.01em', label:'Instrument Serif / Inter'},
  'fraunces':        {ui:'Inter',        display:'Fraunces',        mono:'JetBrains Mono',w:500,t:'-0.02em', label:'Fraunces / Inter'},
};

const App=()=>{
  const[tweaks,setTweak]=useTweaks(window.TWEAK_DEFAULTS);

  React.useEffect(()=>{
    const fp=FONT_PAIRS[tweaks.fontPair]||FONT_PAIRS['inter-jetbrains'];
    const r=document.documentElement.style;
    r.setProperty('--ui-font',`'${fp.ui}'`);r.setProperty('--display-font',`'${fp.display}'`);
    r.setProperty('--mono-font',`'${fp.mono}'`);r.setProperty('--display-weight',String(fp.w));
    r.setProperty('--display-tracking',fp.t);
  },[tweaks.fontPair]);

  const[state,setState]=React.useState({
    nav:'workspace',
    mode:'variations',
    model:'fast',
    style:'',
    prompt:'',
    context:'',
    ratio:'1:1',
    cfg:7,
    refImage:false,
    refImageData:null,
    refImageMime:null,
    refImagePreview:null,
    refImageName:null,
    divergence:35,
    varType:'alternatives',
    locEnabled:false,
    locMulti:false,
    locTextHandling:'leave',
    locRegion:'',
    locRegions:[],
    count:3,
    credits:100,
    generating:false,
    results:[],
    selected:[],
    view:'default',
    error:null,
    history:[],
    library:[],
  });

  // Load persisted data from localStorage on mount
  React.useEffect(()=>{
    try{
      const h=localStorage.getItem('drama_history');
      const l=localStorage.getItem('drama_library');
      const patch={};
      if(h){try{patch.history=JSON.parse(h);}catch(e){}}
      if(l){try{patch.library=JSON.parse(l);}catch(e){}}
      if(Object.keys(patch).length)set(patch);
    }catch(e){}
  },[]);

  const set=patch=>setState(s=>({...s,...patch}));

  // Build shared request body
  const baseBody=s=>({
    prompt:s.prompt,
    style:s.mode==='generate'?(STYLE_MAP.find(m=>m.id===s.style)?.prompt||''):'',
    context:s.context,
    model:s.model,
    count:s.count,
    ratio:s.ratio,
    locEnabled:s.locEnabled,
    locTextHandling:s.locTextHandling,
    locRegion:s.locMulti?s.locRegions.join(', '):s.locRegion,
  });

  const callAPI=async(endpoint,body)=>{
    const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const text=await res.text();
    let data;
    try{data=JSON.parse(text);}catch{
      if(res.status===404)throw new Error(`API route not found (${endpoint}). Make sure the api/ folder is committed to your GitHub repo and re-deployed on Vercel.`);
      throw new Error(`Server returned an unexpected response (HTTP ${res.status}). Check that the api/ folder is deployed.`);
    }
    if(!res.ok)throw new Error(data.error||`Request failed (${res.status})`);
    return data.images;
  };

  const saveHistory=(images,body,snap)=>{
    const entries=images.map(img=>({...img,label:body.context||body.prompt||body.style||'',prompt:body.prompt||'',context:body.context||'',model:snap.model,mode:snap.mode,timestamp:Date.now()}));
    setState(prev=>{
      const next=[...entries,...prev.history].slice(0,24);
      try{localStorage.setItem('drama_history',JSON.stringify(next));}catch(e){
        try{localStorage.setItem('drama_history',JSON.stringify(next.slice(0,6)));}catch(e2){}
      }
      return{...prev,history:next};
    });
  };

  const saveToLibrary=img=>{
    const entry={...img,label:state.prompt||state.context||'',prompt:state.prompt||'',context:state.context||'',model:state.model,timestamp:Date.now()};
    setState(prev=>{
      const next=[entry,...prev.library.filter(l=>l.id!==entry.id)];
      try{localStorage.setItem('drama_library',JSON.stringify(next));}catch(e){}
      return{...prev,library:next};
    });
  };

  const generate=async()=>{
    if(state.generating)return;
    set({generating:true,results:[],selected:[],error:null});
    try{
      const isVar=state.mode==='variations';
      const body={...baseBody(state)};
      if(isVar){
        body.refImageData=state.refImageData;
        body.refImageMime=state.refImageMime;
        body.divergence=state.divergence;
        body.varType=state.varType;
      }
      const snap={model:state.model,mode:state.mode};
      const images=await callAPI(isVar?'/api/variations':'/api/generate',body);
      const cost=state.count*3;
      saveHistory(images,body,snap);
      set({results:images,generating:false,credits:Math.max(0,state.credits-cost)});
    }catch(err){
      set({generating:false,error:err.message});
    }
  };

  // regenAll simply re-runs generate with current settings
  const regenAll=generate;

  const iterateFrom=async img=>{
    if(state.generating)return;
    const newDiv=Math.max(15,state.divergence-15);
    set({generating:true,results:[],selected:[],error:null,divergence:newDiv});
    try{
      const body={...baseBody(state),refImageData:img.data,refImageMime:img.mimeType,divergence:newDiv,varType:state.varType};
      const snap={model:state.model,mode:'variations'};
      const images=await callAPI('/api/variations',body);
      const cost=state.count*3;
      saveHistory(images,body,snap);
      set({results:images,generating:false,credits:Math.max(0,state.credits-cost)});
    }catch(err){
      set({generating:false,error:err.message});
    }
  };

  const fullState={...state,generate,regenAll,iterateFrom,saveToLibrary};

  return(
    <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gridTemplateRows:'52px 1fr',height:'100vh',width:'100vw'}}>
      {/* Header */}
      <header style={{gridColumn:'1/-1',background:'var(--bg-1)',borderBottom:'1px solid var(--line-1)',display:'flex',alignItems:'center',padding:'0 22px',gap:14}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:22,height:22,borderRadius:6,background:'linear-gradient(135deg,#7aa2ff,#c084fc)',display:'flex',alignItems:'center',justifyContent:'center',color:'#0a0e1c'}}>
            <Icon.Sparkle size={12} sw={2.5}/>
          </div>
          <span className="display" style={{fontSize:16,color:'var(--text-1)'}}>Drama Pics</span>
          <span className="mono" style={{fontSize:9.5,padding:'2px 7px',borderRadius:4,border:'1px solid var(--line-2)',color:'var(--text-3)',letterSpacing:'.04em'}}>BETA</span>
        </div>
        <nav style={{display:'flex',gap:2,marginLeft:18}}>
          {[{label:'Workspace',id:'workspace'},{label:'Library',id:'library'},{label:'History',id:'history'}].map(({label,id})=>{
            const active=state.nav===id;
            const badge=id==='history'?(state.history||[]).length:id==='library'?(state.library||[]).length:0;
            return(
              <button key={id} onClick={()=>set({nav:id})} style={{padding:'6px 12px',borderRadius:6,fontSize:12.5,color:active?'var(--text-1)':'var(--text-3)',background:active?'var(--bg-3)':'transparent',fontWeight:active?500:400,display:'flex',alignItems:'center',gap:5}}>
                {label}
                {badge>0&&<span className="mono" style={{fontSize:9,padding:'1px 5px',borderRadius:999,background:active?'var(--accent-soft)':'var(--bg-3)',border:'1px solid',borderColor:active?'var(--accent-line)':'var(--line-1)',color:active?'var(--accent)':'var(--text-4)'}}>{badge}</span>}
              </button>
            );
          })}
        </nav>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:10}}>
          {/* Credits badge */}
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11.5,padding:'5px 11px',borderRadius:999,background:state.credits<10?'#f871710f':'var(--bg-2)',border:'1px solid',borderColor:state.credits<10?'#f8717155':'var(--line-1)',color:state.credits<10?'var(--danger)':'var(--text-2)',transition:'all .3s'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:state.credits<10?'var(--danger)':'var(--warn)',boxShadow:state.credits<10?'0 0 8px #f8717180':'0 0 8px #fbbf2480'}}/>
            <span className="mono" style={{fontSize:10.5}}>{state.credits} credits</span>
          </div>
          {/* Model badge */}
          <div style={{display:'flex',alignItems:'center',gap:7,fontSize:11.5,color:'var(--text-2)',padding:'5px 11px',borderRadius:999,background:'var(--bg-2)',border:'1px solid var(--line-1)'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'var(--success)',boxShadow:'0 0 8px #4ade8080'}}/>
            <span className="mono" style={{fontSize:10.5}}>{state.model==='pro'?'Nano Banana Pro':'Nano Banana 2'} · {state.model==='pro'?'Pro':'Fast'}</span>
          </div>
          <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,#fbbf24,#f87171)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,color:'#0a0e1c'}}>JM</div>
        </div>
      </header>

      <Sidebar state={fullState} set={set}/>
      {state.nav==='history'?<HistoryView state={fullState} set={set}/>:state.nav==='library'?<LibraryView state={fullState} set={set}/>:<Results state={fullState} set={set}/>}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Typography">
          <TweakSelect label="Font pair" value={tweaks.fontPair} onChange={v=>setTweak('fontPair',v)}
            options={Object.entries(FONT_PAIRS).map(([id,fp])=>({value:id,label:fp.label}))}/>
          <div style={{fontSize:11,color:'#888',lineHeight:1.5,marginTop:4}}>Affects display headings, UI labels, and monospace numerics throughout.</div>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,i){console.error('[Drama Pics]',e,i);}
  render(){
    const{err}=this.state;
    if(err){return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:'#08090c',color:'#e8eaf0',gap:18,fontFamily:'Inter,system-ui,sans-serif',padding:40,textAlign:'center'}}>
        <div style={{width:52,height:52,borderRadius:14,background:'#f871710f',border:'1px solid #f8717155',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>⚠</div>
        <div>
          <div style={{fontSize:18,fontWeight:600,marginBottom:8}}>Something went wrong</div>
          <div style={{fontSize:13,color:'#a4abbc',maxWidth:420,lineHeight:1.6,marginBottom:20}}>{err.message}</div>
          <button onClick={()=>this.setState({err:null})} style={{padding:'9px 24px',borderRadius:8,background:'linear-gradient(180deg,#8eb4ff,#5e8cff)',color:'#0a0e1c',fontWeight:600,fontSize:13,border:'none',cursor:'pointer'}}>Reload app</button>
        </div>
      </div>
    );}
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
